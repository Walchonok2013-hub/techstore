
{% extends 'base.html' %}
{% block title %}Сброс пароля{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Сброс пароля</h2>
    <p>Введите ваш email, и мы отправим инструкции по сбросу пароля.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Отправить</button>
    </form>
</div>
{% endblock %}
