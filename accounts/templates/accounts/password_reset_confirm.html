{% extends 'base.html' %}
{% block title %}Установить новый пароль{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2>Установить новый пароль</h2>
    {% if validlink %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Сохранить</button>
        </form>
    {% else %}
        <p>Ссылка недействительна. Возможно, она уже использовалась или истекла.</p>
    {% endif %}
</div>
{% endblock %}
