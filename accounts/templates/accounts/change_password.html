
{% extends 'base.html' %}

{% block title %}Сменить пароль — Techstore{% endblock %}

{% block content %}
<div class="container my-5">
    <h2>Сменить пароль</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Сменить пароль</button>
    </form>
    <p><a href="{% url 'accounts:profile' %}">Назад к профилю</a></p>
</div>
{% endblock %}
