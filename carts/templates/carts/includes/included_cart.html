{% if cart %}
    <div class="cart-items">
        {% for item in cart %}
            <div class="cart-item mb-3 p-3 border rounded">
                <div class="d-flex justify-content-between align-items-center">
                    <div class="product-info">
                <img src="{{ item.product.image.url }}" alt="{{ item.product.name }}"
                     class="img-thumbnail me-3" style="width: 60px;">
                <div>
                    <strong>{{ item.product.name }}</strong><br>
            <small class="text-muted">{{ item.price }} руб. × {{ item.quantity }}</small>
        </div>
    </div>
    <div class="actions d-flex align-items-center">
        <form action="{% url 'cart:cart_update' item.product.id %}" method="post" class="d-inline">
            {% csrf_token %}
            <input type="number" name="quantity" value="{{ item.quantity }}" min="1" max="99" class="form-control form-control-sm" style="width: 70px;">
            <button type="submit" class="btn btn-sm btn-outline-primary ms-2">Обновить</button>
        </form>
        <a href="{% url 'cart:cart_remove' item.product.id %}"
           class="btn btn-sm btn-outline-danger ms-2"
           onclick="return confirm('Удалить товар из корзины?')">
            Удалить
        </a>
    </div>
</div>
{% endfor %}
</div>
<hr>
<div class="cart-total text-end">
    <h5>Итого: <strong>{{ cart.get_total_price }} руб.</strong></h5>
</div>
<div class="mt-3 text-end">
    <a href="{% url 'cart:cart_detail' %}" class="btn btn-primary">Перейти к оформлению</a>
</div>
{% else %}
    <div class="text-center py-4">
        <i class="fas fa-shopping-cart fa-3x text-muted mb-3"></i>
        <h4>Корзина пуста</h4>
        <p>Добавьте товары, чтобы увидеть их здесь.</p>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Продолжить покупки</button>
    </div>
{% endif %}
