
{% extends 'users/base_users.html' %}

{% block title %}Выход из системы{% endblock title %}

{% block page_title %}До свидания!{% endblock page_title %}

{% block content %}
    <div class="logout-container">
        <div class="logout-card">
            <h2>Вы успешно вышли из системы</h2>

            <div class="alert alert-success">
                <p>Вы успешно завершили сеанс работы.</p>
            </div>

            <div class="logout-actions">
                <a href="{% url 'login' %}" class="btn btn-primary">Войти снова</a>
                <a href="{% url 'home' %}" class="btn btn-secondary">На главную</a>
            </div>
        </div>
    </div>
{% endblock content %}

<style>
    .logout-container {
        max-width: 400px;
        margin: 0 auto;
        padding: 20px;
        background: #f0f0f0;
        border-radius: 5px;
    }
    .logout-card {
        padding: 20px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    .logout-actions a {
        margin: 0 10px;
        text-decoration: none;
        color: #007bff;
    }
</style>
