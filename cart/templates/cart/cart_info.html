<div class="cart-info d-flex align-items-center">
    <i class="fas fa-shopping-cart me-2"></i>
    {% with total_items=cart|length %}
        {% if total_items > 0 %}
            <a href="{% url 'cart:cart_detail' %}" class="text-decoration-none">
                {{ total_items }} товар(ов) — {{ cart.get_total_price }} руб.
            </a>
        {% else %}
            Корзина пуста
        {% endif %}
    {% endwith %}
</div>
